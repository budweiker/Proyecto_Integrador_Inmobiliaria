<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Acceso Inmobiliaria</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.4.1/css/bootstrap.min.css">
    <link href="css/style.css" rel="stylesheet">
    <style>
        .hidden { display: none; }
        .card { border-radius: 15px; border: none; }
        .btn-toggle { color: #007bff; cursor: pointer; text-decoration: underline; }
    </style>
</head>
<body class="bg-light">

    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card shadow p-4">
                    <h2 id="form-title" class="text-center mb-4">Crear Cuenta</h2>
                    
                    <form id="auth-form">
                        <div id="extra-fields">
                            <div class="form-group">
                                <label>Nombre Completo</label>
                                <input type="text" class="form-control" id="reg-name" placeholder="Ej: Juan Pérez">
                            </div>
                            <div class="form-group">
                                <label>Cédula</label>
                                <input type="text" class="form-control" id="reg-id" placeholder="Documento de identidad">
                            </div>
                            <div class="form-group">
                                <label>Fecha de Nacimiento</label>
                                <input type="date" class="form-control" id="reg-birth">
                            </div>
                        </div>

                        <div class="form-group">
                            <label>Correo Electrónico</label>
                            <input type="email" class="form-control" id="auth-email" placeholder="correo@ejemplo.com" required>
                        </div>
                        <div class="form-group">
                            <label>Contraseña</label>
                            <input type="password" class="form-control" id="auth-pass" placeholder="Mínimo 6 caracteres" required>
                        </div>

                        <button type="submit" id="btn-main" class="btn btn-primary btn-block">Registrarse Ahora</button>
                    </form>

                    <p class="text-center mt-3" id="toggle-text">
                        ¿Ya tienes cuenta? <span class="btn-toggle" id="switch-to-login">Inicia Sesión</span>
                    </p>
                </div>
            </div>
        </div>
    </div>
    

    <script type="module">
        // Si va a tocar este codigo hagalo con cuidado, es la base de datos
        import { registrarUsuarioCompleto, iniciarSesion } from './js/auth.js';

        let isRegisterMode = true; // Por default empieza en la pagina de registro

        const extraFields = document.getElementById('extra-fields'); // importar variables iniciales
        const formTitle = document.getElementById('form-title');
        const btnMain = document.getElementById('btn-main');
        const toggleText = document.getElementById('toggle-text');

        // FUNCIÓN PARA CAMBIAR ENTRE REGISTRO Y LOGIN
        document.getElementById('switch-to-login').addEventListener('click', function() {
            isRegisterMode = !isRegisterMode;

            if (isRegisterMode) {
                formTitle.innerText = "Crear Cuenta";
                btnMain.innerText = "Registrarse Ahora";
                extraFields.classList.remove('hidden');
                toggleText.innerHTML = '¿Ya tienes cuenta? <span class="btn-toggle" id="switch-to-login">Inicia Sesión</span>';
            } else {
                formTitle.innerText = "Iniciar Sesión";
                btnMain.innerText = "Entrar";
                extraFields.classList.add('hidden');
                toggleText.innerHTML = '¿No tienes cuenta? <span class="btn-toggle" id="switch-to-login">Regístrate</span>';
            }
            // Interuptor para cambiar entre registro y login
            document.getElementById('switch-to-login').onclick = () => document.getElementById('switch-to-login').click();
        });

        // LÓGICA DEL FORMULARIO
        document.getElementById('auth-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('auth-email').value; // captura los datos y evita que la pagina se recarge sola, para no perder todo
            const pass = document.getElementById('auth-pass').value;

            if (isRegisterMode) {
                // MODO REGISTRO
                const nombre = document.getElementById('reg-name').value;
                const cedula = document.getElementById('reg-id').value;
                const fecha = document.getElementById('reg-birth').value;

                if (!nombre || !cedula || !fecha) { //Verifica que todos los datos esten, en caso de que falte alguno el registro no sera exitoso
                    alert("Completa todos los campos para el registro.");
                    return;
                }

                try {
                    await registrarUsuarioCompleto(email, pass, { nombre, cedula, fecha });
                    alert("Registro exitoso.");
                    window.location.href = 'home.html';
                } catch (err) { alert("Error: " + err.message); }

            } else {
                // MODO LOGIN
                try {
                    await iniciarSesion(email, pass); //en login solo puse para que se ponga el correo y la contraseña, ya que los otros datos ya los tenemos entonces no son necesarios volver a pedirlos
                    window.location.href = 'home.html';
                } catch (err) { alert("Correo o contraseña incorrectos."); }
            }
        });
    </script>
</body>
</html>
